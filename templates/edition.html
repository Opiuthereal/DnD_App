{% extends "base.html" %}
{% block titre %}Édition{% endblock %}

{% block style %}
<link rel="stylesheet" href="/static/css/edition.css">
{% endblock %}

{% block contenu %}
<div id="app-edition">

    <!-- ═══════════════════════════════════════ -->
    <!--  ONGLETS ÉDITION                       -->
    <!-- ═══════════════════════════════════════ -->
    <nav id="onglets-edition">
        <button class="onglet actif" data-onglet="maps">🗺️ Maps</button>
        <button class="onglet" data-onglet="tokens">🧙 Jetons</button>
    </nav>

    <!-- ═══════════════════════════════════════ -->
    <!--  PANNEAU : Maps                        -->
    <!-- ═══════════════════════════════════════ -->
    <div id="panneau-maps" class="panneau-edition actif">

        <!-- Colonne gauche : outils -->
        <aside id="outils-maps">

            <section class="section-edition">
                <h2>Upload map</h2>
                <input type="file" id="input-upload-map" accept=".png,.jpg,.jpeg">
                <button id="btn-upload-map">📤 Uploader</button>
            </section>

            <section class="section-edition">
                <h2>Grille</h2>

                <label>Afficher la grille</label>
                <input type="checkbox" id="grille-visible" checked>

                <label>Nombre de cases</label>
                <input type="number" id="input-nb-cases" min="1" max="500" step="0.1" value="20" style="width:100%;padding:6px 10px;background:var(--bg-input);border:1px solid var(--bordure);border-radius:var(--rayon);color:var(--texte);font-size:13px;">
                <input type="range" id="slider-nb-cases" min="5" max="100" step="0.1" value="20">

                <label>Décalage X : <span id="val-offset-x">0</span>px</label>
                <input type="range" id="slider-offset-x" min="-100" max="100" value="0">

                <label>Décalage Y : <span id="val-offset-y">0</span>px</label>
                <input type="range" id="slider-offset-y" min="-100" max="100" value="0">

                <label>Couleur de la grille</label>
                <input type="color" id="grille-couleur" value="#ffffff">

                <label>Opacité : <span id="val-opacite">25</span>%</label>
                <input type="range" id="slider-opacite" min="5" max="100" value="25">
            </section>

        </aside>

        <!-- Colonne droite : aperçu canvas -->
        <main id="apercu-map">
            <canvas id="canvas-edition"></canvas>
        </main>

    </div>

    <!-- ═══════════════════════════════════════ -->
    <!--  PANNEAU : Jetons                      -->
    <!-- ═══════════════════════════════════════ -->
    <div id="panneau-tokens" class="panneau-edition">

        <!-- Colonne gauche : liste des jetons créés -->
        <aside id="liste-tokens-crees">
            <h2>Jetons créés</h2>
            <div id="grille-tokens">
                <!-- Rempli dynamiquement par edition.js -->
            </div>
        </aside>

        <!-- Colonne droite : créer un jeton -->
        <main id="outils-tokens">

            <section class="section-edition">
                <h2>Créer un jeton</h2>

                <label>Nom</label>
                <input type="text" id="token-nom" placeholder="Ex: Aragorn">

                <label>Type</label>
                <select id="token-type">
                    <option value="joueur">Joueur (cercle)</option>
                    <option value="ennemi">Ennemi (carré rouge)</option>
                    <option value="pnj">PNJ (carré jaune)</option>
                </select>

                <label>Couleur de bordure</label>
                <input type="color" id="token-bordure" value="#4A90D9">

                <label>Taille</label>
                <select id="token-taille">
                    <option value="S">S — petit</option>
                    <option value="M" selected>M — normal</option>
                    <option value="L">L — grand</option>
                </select>

                <label>Image du jeton</label>
                <input type="file" id="token-image-input" accept=".png,.jpg,.jpeg">

                <hr>

                <!-- Aperçu du recadrage (comme Instagram) -->
                <div id="token-recadrage-wrapper">
                    <div id="token-masque">
                        <img id="token-image-preview" src="" alt="" draggable="false">
                    </div>
                    <input type="range" id="token-zoom" min="10" max="200" value="100">
                    <label>Zoom de l'image</label>
                </div>

                <button id="btn-creer-token">✅ Créer le jeton</button>
            </section>

        </main>

    </div>

</div>
{% endblock %}

{% block script %}
<script src="/static/js/edition.js"></script>
{% endblock %}
