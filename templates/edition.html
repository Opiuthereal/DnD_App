{% extends "base.html" %}
{% block titre %}Édition{% endblock %}

{% block style %}
<link rel="stylesheet" href="/static/css/edition.css">
{% endblock %}

{% block contenu %}
<div id="app-edition">

    <nav id="onglets-edition">
        <button class="onglet actif" data-onglet="maps">🗺️ Maps</button>
        <button class="onglet" data-onglet="tokens">🧙 Jetons</button>
        <button class="onglet" data-onglet="presets">🗂️ Présets</button>
    </nav>

    <!-- ═══════════════════════════════════════ -->
    <!--  PANNEAU : Maps                        -->
    <!-- ═══════════════════════════════════════ -->
    <div id="panneau-maps" class="panneau-edition actif">

        <aside id="outils-maps">

            <!-- Upload -->
            <section class="section-edition">
                <h2>Upload map</h2>
                <input type="file" id="input-upload-map" accept=".png,.jpg,.jpeg">
                <button id="btn-upload-map">📤 Uploader</button>
            </section>

            <!-- Mes Maps -->
            <section class="section-edition">
                <h2>Mes Maps</h2>
                <div id="liste-maps">
                    <!-- Rempli dynamiquement -->
                </div>
                <button id="btn-enregistrer-map">💾 Enregistrer config grille</button>
            </section>

            <!-- Grille -->
            <section class="section-edition">
                <h2>Grille</h2>

                <label>Afficher la grille</label>
                <input type="checkbox" id="grille-visible" checked>

                <label>Nombre de cases</label>
                <input type="number" id="input-nb-cases" min="1" max="500" step="0.1" value="20">
                <input type="range" id="slider-nb-cases" min="5" max="1000" step="0.1" value="20">

                <label>Décalage X : <span id="val-offset-x">0</span>px</label>
                <input type="range" id="slider-offset-x" min="-100" max="100" value="0">

                <label>Décalage Y : <span id="val-offset-y">0</span>px</label>
                <input type="range" id="slider-offset-y" min="-100" max="100" value="0">

                <label>Couleur de la grille</label>
                <input type="color" id="grille-couleur" value="#ffffff">

                <label>Opacité : <span id="val-opacite">25</span>%</label>
                <input type="range" id="slider-opacite" min="5" max="100" value="25">
            </section>

            <!-- Autre -->
            <section class="section-edition">
                <h2>Autre</h2>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="checkbox" id="map-exploration">
                    Mode exploration (Fog of War)
                </label>
            </section>

        </aside>

        <main id="apercu-map">
            <canvas id="canvas-edition"></canvas>
        </main>

    </div>

    <!-- ═══════════════════════════════════════ -->
    <!--  PANNEAU : Jetons                      -->
    <!-- ═══════════════════════════════════════ -->
    <div id="panneau-tokens" class="panneau-edition">

        <aside id="liste-tokens-crees">
            <h2>Jetons créés</h2>
            <div id="grille-tokens"></div>
        </aside>

        <main id="outils-tokens">
            <section class="section-edition">
                <h2>Créer un jeton</h2>

                <label>Nom</label>
                <input type="text" id="token-nom" placeholder="Ex: Aragorn">

                <label>Type</label>
                <select id="token-type">
                    <option value="joueur">Joueur (cercle)</option>
                    <option value="ennemi">Ennemi (carré rouge)</option>
                    <option value="pnj">PNJ (carré jaune)</option>
                </select>

                <label>Couleur de bordure</label>
                <input type="color" id="token-bordure" value="#4A90D9">

                <label>Taille</label>
                <select id="token-taille">
                    <option value="S">S — petit</option>
                    <option value="M" selected>M — normal</option>
                    <option value="L">L — grand</option>
                </select>

                <label>Image du jeton</label>
                <input type="file" id="token-image-input" accept=".png,.jpg,.jpeg">

                <hr>

                <div id="token-recadrage-wrapper">
                    <div id="token-masque">
                        <img id="token-image-preview" src="" alt="" draggable="false">
                    </div>
                    <input type="range" id="token-zoom" min="10" max="200" value="100">
                    <label>Zoom de l'image</label>
                </div>

                <button id="btn-creer-token">✅ Créer le jeton</button>
            </section>
        </main>

    </div>

    <!-- ═══════════════════════════════════════ -->
    <!--  PANNEAU : Présets                      -->
    <!-- ═══════════════════════════════════════ -->
    <div id="panneau-presets" class="panneau-edition">

        <aside id="outils-presets">

            <!-- Mes Maps (lecture seule) -->
            <section class="section-edition">
                <h2>Mes Maps</h2>
                <div id="preset-liste-maps">
                    <!-- Rempli dynamiquement par preset.js -->
                </div>
                <button id="preset-btn-vider-map">🗑️ Vider map</button>
            </section>

            <!-- Mes Jetons -->
            <section class="section-edition">
                <h2>Mes Jetons</h2>
                <div id="preset-liste-jetons">
                    <!-- Rempli dynamiquement par preset.js -->
                </div>
                <div class="preset-btn-row">
                    <button id="preset-btn-vider-jetons">🗑️ Vider jetons</button>
                    <button id="preset-btn-vider-1-jeton">🎯 Vider 1 jeton</button>
                    <button id="preset-btn-cacher-jeton">👁️ Caché</button>
                </div>
            </section>

            <!-- Formes / Murs -->
            <section class="section-edition">
                <h2>Formes</h2>
                <div class="preset-btn-row">
                    <button class="preset-btn-forme" id="preset-outil-carre">⬜ Carré</button>
                    <button class="preset-btn-forme" id="preset-outil-cercle">⭕ Cercle</button>
                    <button class="preset-btn-forme" id="preset-outil-porte">🚪 Porte</button>
                </div>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="checkbox" id="preset-montrer-murs" checked>
                    Montrer murs
                </label>
                <div class="preset-btn-row">
                    <button id="preset-btn-deplacer">✋ Déplacer</button>
                    <button id="preset-btn-suppr-forme">❌ Supprimer</button>
                </div>
            </section>

            <!-- Enregistrer -->
            <section class="section-edition">
                <h2>Enregistrer</h2>
                <input type="text" id="preset-nom" placeholder="Nom du préset...">
                <button id="preset-btn-enregistrer">💾 Enregistrer le préset</button>
            </section>

            <!-- Mes Présets -->
            <section class="section-edition">
                <h2>Mes Présets</h2>
                <div id="preset-liste-presets">
                    <!-- Rempli dynamiquement -->
                </div>
            </section>

        </aside>

        <!-- Canvas Présets — indépendant du canvas Maps -->
        <main id="apercu-preset">
            <canvas id="canvas-preset"></canvas>
        </main>

    </div>

</div>
{% endblock %}

{% block script %}
<script src="/static/js/edition.js"></script>
<script src="/static/js/preset.js"></script>
{% endblock %}
